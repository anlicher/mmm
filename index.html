    <style>
        :root {
            --bg-color: #050505;
            --text-color: #e0e0e0;
            --accent-color: #8b0000;
            --ui-bg: rgba(20, 20, 20, 0.8);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            user-select: none; 
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            transition: filter 0.2s, background-color 0.2s;
        }

        .noise {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            opacity: 0; pointer-events: none; z-index: 999;
            transition: opacity 0.1s;
        }
        body.jumpscare .noise { opacity: 0.15; }
        body.jumpscare { filter: contrast(150%) saturate(0) invert(10%); }
        body.jumpscare-red { filter: drop-shadow(0 0 10px red); background-color: #1a0000; }

        .screen {
            display: none; width: 100%; height: 100%;
            padding: 20px; flex-direction: column; align-items: center; justify-content: center;
        }
        .screen.active { display: flex; }

        /* 开始界面 */
        #start-screen {
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            animation: pulseBg 4s infinite alternate;
        }
        @keyframes pulseBg { 0% { background-size: 100% 100%; } 100% { background-size: 120% 120%; } }
        
        h1 { font-size: 24px; margin-bottom: 20px; letter-spacing: 5px; color: #fff; text-shadow: 0 0 10px #fff; }
        .form-group { margin-bottom: 15px; width: 80%; max-width: 300px; text-align: left; }
        .form-group label { display: block; font-size: 12px; margin-bottom: 5px; color: #aaa; }
        .form-group input, .form-group select {
            width: 100%; padding: 8px; background: transparent; border: 1px solid #444;
            color: #fff; outline: none; font-family: inherit;
        }
        .form-group input:focus { border-color: var(--accent-color); }
        .btn {
            padding: 10px 30px; background: transparent; border: 1px solid var(--text-color);
            color: var(--text-color); cursor: pointer; font-family: inherit; margin-top: 10px;
            transition: 0.3s;
        }
        .btn:hover { background: var(--text-color); color: #000; }

        /* 游戏界面 */
        #game-screen { justify-content: flex-start; position: relative; padding-top: 80px; cursor: pointer; }
        
        /* 状态栏 */
        .status-bar {
            position: absolute; top: 0; left: 0; width: 100%; padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
            background: var(--ui-bg); border-bottom: 1px solid #333; z-index: 10;
        }
        .player-info { display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .player-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 1px solid #555; }
        
        /* 回放 LOG 按钮 (高级感无边框) */
        .log-btn {
            position: absolute; right: 90px; color: #888; font-size: 12px; letter-spacing: 2px;
            cursor: pointer; text-transform: uppercase; transition: color 0.3s;
        }
        .log-btn:hover { color: #fff; text-shadow: 0 0 5px rgba(255,255,255,0.5); }

        /* 罚罪头像变大 */
        .fazui-info { display: flex; align-items: center; gap: 10px; cursor: pointer; position: relative; }
        .fazui-avatar { width: 55px; height: 55px; border-radius: 8px; border: 2px solid var(--accent-color); object-fit: cover; background-color: #222; box-shadow: 0 0 10px rgba(139,0,0,0.5); }
        
        /* 文本与对话区 */
        .text-area {
            flex-grow: 1; width: 100%; max-width: 600px; margin: 0 auto;
            display: flex; flex-direction: column; justify-content: center;
            font-size: 16px; line-height: 1.8; letter-spacing: 1px;
            pointer-events: none;
        }
        /* 旁白样式 */
        .text-line { margin-bottom: 15px; opacity: 0; transform: translateY(10px); animation: fadeIn 0.5s forwards; text-shadow: 0 0 2px rgba(255,255,255,0.2); }
        
        /* 独立对话框样式 */
        .dialogue-container {
            display: flex; align-items: flex-start; margin-bottom: 20px; width: 100%;
            opacity: 0; transform: translateY(10px); animation: fadeIn 0.5s forwards;
        }
        .dialogue-container.fazui { flex-direction: row; }
        .dialogue-container.player { flex-direction: row-reverse; }
        
        .dialogue-avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
        .dialogue-container.fazui .dialogue-avatar { border: 1px solid var(--accent-color); border-radius: 8px; }
        .dialogue-container.player .dialogue-avatar { border: 1px solid #555; }
        
        .dialogue-content { max-width: 70%; display: flex; flex-direction: column; }
        .dialogue-container.fazui .dialogue-content { align-items: flex-start; margin-left: 12px; }
        .dialogue-container.player .dialogue-content { align-items: flex-end; margin-right: 12px; }
        
        .dialogue-name { font-size: 12px; color: #888; margin-bottom: 4px; font-weight: bold; }
        .dialogue-container.fazui .dialogue-name { color: var(--accent-color); }
        
        .dialogue-bubble { padding: 10px 15px; border-radius: 8px; font-size: 15px; position: relative; word-wrap: break-word; }
        .dialogue-container.fazui .dialogue-bubble { background: rgba(30, 30, 30, 0.9); border: 1px solid #444; border-top-left-radius: 0; color: #ddd; }
        .dialogue-container.player .dialogue-bubble { background: rgba(80, 20, 20, 0.6); border: 1px solid var(--accent-color); border-top-right-radius: 0; color: #fff; }

        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

        /* Emoji 小动画特效 */
        .floating-emoji {
            position: fixed; pointer-events: none; z-index: 50; font-size: 28px;
            animation: floatUp 2s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(0.5); }
            100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
        }

        /* 选项区 */
        .choices-area {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; display: none; flex-direction: column; gap: 10px; z-index: 20;
        }
        .choice-btn {
            background: rgba(10,10,10,0.9); border: 1px solid #444; color: #ccc;
            padding: 12px; text-align: left; font-size: 14px; cursor: pointer; transition: 0.2s;
        }
        .choice-btn:hover { border-color: var(--accent-color); color: #fff; padding-left: 20px; }

        /* 罚罪状态模态框 (美化: 猫爪、波点、星星) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 100;
        }
        .modal-content-fazui {
            background-color: #1a1515;
            background-image: radial-gradient(#333 1px, transparent 1px), radial-gradient(#333 1px, transparent 1px);
            background-size: 20px 20px; background-position: 0 0, 10px 10px;
            border: 2px solid var(--accent-color); padding: 25px;
            width: 85%; max-width: 320px; text-align: center; color: #ddd;
            position: relative; overflow: hidden; border-radius: 10px; box-shadow: 0 0 20px rgba(139,0,0,0.4);
        }
        .modal-dec-paw { position: absolute; font-size: 60px; opacity: 0.05; right: -15px; bottom: -15px; transform: rotate(-30deg); pointer-events: none; }
        .modal-dec-star { position: absolute; font-size: 20px; opacity: 0.6; top: 15px; left: 15px; pointer-events: none; animation: twinkle 1.5s infinite alternate; }
        @keyframes twinkle { from { opacity: 0.2; } to { opacity: 0.8; } }
        
        .modal-content-fazui h3 { color: var(--accent-color); margin-bottom: 20px; position: relative; z-index: 2; font-size: 18px; }
        .modal-content-fazui p { font-size: 14px; text-align: left; margin-bottom: 12px; border-left: 3px solid var(--accent-color); padding-left: 10px; position: relative; z-index: 2; background: rgba(0,0,0,0.5); padding-top: 5px; padding-bottom: 5px;}
        .close-btn { margin-top: 20px; padding: 8px 20px; background: #000; color: #fff; border: 1px solid var(--accent-color); cursor: pointer; position: relative; z-index: 2; transition: 0.3s;}
        .close-btn:hover { background: var(--accent-color); }/* 回放记录模态框 */
        .log-content {
            background: rgba(15,15,15,0.95); border: 1px solid #444; width: 90%; max-width: 500px;
            height: 70vh; padding: 20px; border-radius: 5px; overflow-y: auto; color: #bbb; text-align: left;
        }
        .log-item { margin-bottom: 10px; font-size: 13px; line-height: 1.6; border-bottom: 1px dashed #333; padding-bottom: 5px; }
        .log-speaker { font-weight: bold; margin-right: 5px; }
        .log-speaker.fazui { color: var(--accent-color); }
        .log-speaker.player { color: #fff; }
    </style>
</head>

    <script>
        // =====================================================================
        // ↓↓↓↓↓ 请在这里填入你准备好的罚罪头像图片链接 ↓↓↓↓↓
        // =====================================================================
        const FAZUI_AVATAR_URL = "https://images.unsplash.com/photo-1517849845537-4d257902454a?ixlib=rb-1.2.1&auto=format&fit=crop&w=100&q=80"; 
        // =====================================================================

        let player = { name: "", age: "", gender: "", hairColor: "", avatar: "", emoji: "", choice: "" };
        let currentLine = 0;
        let isWaitingChoice = false;
        let storyLog = [];

        const story = [
            { type: "narration", text: "你的房间里只剩下屏幕的冷光。" },
            { type: "narration", text: "十一月的夜晚，暖气片发出低沉的嗡鸣。耳机隔绝了整个世界，只剩游戏里废弃工厂区的风声、远处零星的枪响，以及他的呼吸。" },
            { type: "narration", text: "你的队友\"罚罪\"，在麦里安静地呼吸着。那种呼吸太均匀了，像某种恒温动物在黑暗中蛰伏时的状态。" },
            { type: "narration", text: "你已经和他打了三个月的游戏。三个月里你注意到一件事：他从来没有过急促的喘息。" },
            { type: "narration", text: "不正常。", effect: "jumpscare" },
            { type: "narration", text: "屏幕上，他的角色蹲在废弃建筑的阴影里。对面的通道有人影闪动。你们刚刚遭了埋伏，队伍被打散，只剩你和他。准星一闪。" },
            { type: "narration", text: "“砰。”", effect: "jumpscare-red" },
            { type: "narration", text: "对面探头的人应声倒地。他的角色甚至没有从阴影里挪动半步，枪口冒着青烟。" },
            { type: "dialogue", speaker: "fazui", text: "西南方向，还有两个。", triggerAnim: "fazui" },
            { type: "dialogue", speaker: "fazui", text: "乖一点。待在掩体后面别动，{playerName}。" },
            { type: "narration", text: "鼠标点击的声音清脆而有节奏。他的角色开始向侧翼迂回。" },
            { type: "dialogue", speaker: "fazui", text: "交给我。我会把他们处理得干干净净。" },
            { type: "dialogue", speaker: "fazui", text: "谁也不能碰你。", triggerAnim: "player" },
            { type: "narration", text: "你靠在电脑椅背上。一个正常人说到“处理”这个词的时候，不会用这种像在讨论今晚吃什么一样随便的语气。但他说的是“处理人”。" },
            { type: "narration", text: "屏幕左下角跳出击杀提示。两条红色的kill信息安静地滚过聊天框。然后他的角色重新出现在你的视野范围内，身上没有掉一滴血。" },
            { type: "dialogue", speaker: "fazui", text: "好了。干净了。" },
            { type: "dialogue", speaker: "fazui", text: "你没有动？很好。听话的孩子。" },
            { type: "narration", text: "你的后颈有些发麻。不是恐惧。一种本该让你觉得不舒服、但你却没有觉得不舒服的奇怪感觉。你甚至觉得有点兴奋。" },
            { type: "narration", text: "因为你不想他停下来。你觉得自己对“正常”这个词的定义，和大多数人不太一样。" },
            { type: "dialogue", speaker: "fazui", text: "或者……你想自己动手？" },
            { type: "dialogue", speaker: "fazui", text: "前面还有人，下一波。你想怎么玩，我都陪你。" },
            { type: "narration", text: "他的角色卡在你右侧视野死角里，背对着你，把整个前方的危险都挡在身前。新一波正在靠近。怎么办？", isChoice: true }
        ];

        const choices = [
            { id: "A", text: "【躲着看戏】“好啊，交给你了。”", desc: "乖乖躲在掩体后面看他杀人。" },
            { id: "B", text: "【猛攻】“我才不躲。”", desc: "直接探出头，不管三七二十一对着通道扫射。" },
            { id: "C", text: "【偷偷绕后阴人】“我绕到他们后面去。”", desc: "悄悄摸出去，看他发现你不在掩体后什么反应。" },
            { id: "D", text: "【哲学提问】“你为什么总是对我这么好？”", desc: "在这个紧张关头突然发问。" }
        ];

        document.getElementById('uiFazuiAvatar').src = FAZUI_AVATAR_URL;
        document.getElementById('avatarInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = function(e) { player.avatar = e.target.result; }
                reader.readAsDataURL(file);
            }
        });

        function startGame() {
            const nameInput = document.getElementById('playerName').value.trim();
            const ageInput = document.getElementById('playerAge').value.trim();
            const hairInput = document.getElementById('playerHairColor').value.trim();

            if(!nameInput || !ageInput || !hairInput) {
                alert("【系统提示】\n检测到信息不完整。请填完必填的个人档案（ID、年龄、发色），以便进行精神链接！");
                return;
            }

            player.name = nameInput;
            player.age = ageInput;
            player.gender = document.getElementById('playerGender').value;
            player.hairColor = hairInput;
            player.emoji = document.getElementById('playerEmoji').value.trim();
            
            document.getElementById('uiPlayerName').innerText = player.name;
            if(player.avatar) document.getElementById('uiPlayerAvatar').src = player.avatar;

            document.getElementById('start-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            
            renderLine();
        }

        function spawnEmoji(type) {
            const emojiChar = type === 'fazui' ? '🐱' : (player.emoji || '');
            if(!emojiChar) return; 

            const el = document.createElement('div');
            el.className = 'floating-emoji';
            el.innerText = emojiChar;
            
            const randomX = Math.random() * 60 + 20; 
            el.style.left = randomX + 'vw';
            el.style.bottom = '30vh';

            document.body.appendChild(el);
            setTimeout(() => el.remove(), 2000); 
        }

        function renderLine() {
            if(isWaitingChoice) return;
            if(currentLine >= story.length) {
                if(player.choice) showReport();
                return;
            }

            const lineData = story[currentLine];
            const textArea = document.getElementById('textArea');
            document.body.className = ''; 

            let text = lineData.text.replace('{playerName}', player.name);

            let logEntry = `<div class="log-item">`;
            if(lineData.type === 'dialogue') {
                let speakerName = lineData.speaker === 'fazui' ? '罚罪 🐱' : player.name;
                let speakerClass = lineData.speaker === 'fazui' ? 'fazui' : 'player';
                logEntry += `<span class="log-speaker ${speakerClass}">[${speakerName}]</span> ${text}`;
            } else {
                logEntry += `<span style="color:#777;">${text}</span>`;
            }
            logEntry += `</div>`;
            storyLog.push(logEntry);

            if(lineData.effect) {
